<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Học Vocabs Của Nhật Quang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --success: #22c55e; --error: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
    font-family: 'Inter', sans-serif; 
    background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1920&q=80'); 
    background-size: cover; 
    background-attachment: fixed; 
    background-position: center; 
    margin: 0; 
    display: flex; 
    justify-content: center; 
}
        .app-container { 
    width: 100%; 
    max-width: 600px; 
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(20px); 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    position: relative; 
    box-shadow: 0 0 30px rgba(0,0,0,0.2); 
}
        .nav-bar { 
    display: flex; 
    justify-content: space-around; 
    padding: 10px; 
    background: rgba(255, 255, 255, 0.2); /* Trong suốt */
    position: sticky; 
    top: 0; 
    z-index: 100; 
    border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
    backdrop-filter: blur(10px); 
}
        .nav-item { padding: 10px 20px; cursor: pointer; font-weight: 600; color: var(--text-sub); border-radius: 20px; transition: 0.3s; }
        .nav-item.active { 
    color: var(--primary); 
    background: rgba(255, 255, 255, 0.5); /* Nổi bật ô đang chọn */
}
        .content { padding: 20px; flex: 1; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { 
    background: rgba(255, 255, 255, 0.2); 
    padding: 20px; 
    border-radius: 20px; 
    text-align: center; 
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(5px);
}
        .stat-card b { font-size: 24px; color: var(--primary); display: block; }
        #quiz-section, #config-section { display: none; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .q-img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; background: #e2e8f0; }
        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
        .option { 
    background: rgba(255, 255, 255, 0.3); 
    border: 1px solid rgba(255, 255, 255, 0.3); 
    padding: 16px; 
    border-radius: 15px; 
    margin-bottom: 12px; 
    cursor: pointer; 
    font-weight: 500; 
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    color: var(--text-main);
}

.option:hover { 
    background: rgba(255, 255, 255, 0.6); 
    transform: translateY(-2px); 
}

.option.correct { 
    background: rgba(34, 197, 94, 0.3) !important; 
    border-color: #22c55e !important; 
    color: #14532d !important; 
}

.option.wrong { 
    background: rgba(239, 68, 68, 0.3) !important; 
    border-color: #ef4444 !important; 
    color: #7f1d1d !important; 
}
        .explanation { 
    background: rgba(255, 255, 255, 0.3); 
    padding: 15px; 
    border-radius: 15px; 
    margin-top: 15px; 
    display: none; 
    position: relative; 
    border-left: 4px solid var(--primary); 
    backdrop-filter: blur(5px);
}
.voice-btn { 
    position: absolute; 
    right: 10px; 
    top: 10px; 
    background: var(--primary); 
    color: white; 
    border: none; 
    border-radius: 50%; 
    width: 35px; 
    height: 35px; 
    cursor: pointer; 
}
textarea { 
    width: 100%; 
    height: 250px; 
    border-radius: 15px; 
    border: 1px solid rgba(255,255,255,0.3); 
    padding: 15px; 
    font-size: 14px; 
    background: rgba(255,255,255,0.2);
}
    </style>
</head>
<body>
<div class="app-container">
    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('stats', this)">📊 Thống kê</div>
        <div class="nav-item" onclick="showTab('quiz', this)">✍️ Học tập</div>
        <div class="nav-item" onclick="showTab('config', this)">⚙️ Cài đặt</div>
    </div>
    <div class="content">
        <div id="stats-section">
            <h2>Hành trình của tôi</h2>
            <div class="stats-grid">
                <div class="stat-card"><b id="stat-total">0</b>Từ đã học</div>
                <div class="stat-card"><b id="stat-correct">0</b>Câu đúng</div>
                <div class="stat-card" style="grid-column: span 2;"><b id="stat-days">1</b>Ngày liên tiếp</div>
            </div>
        </div>
        <div id="quiz-section">
            <div id="quiz-active" style="display:none">
                <div class="quiz-header"><button onclick="prev()">⬅️</button><span>Câu <b id="cur-idx">1</b> / <span id="total-idx">0</span></span><button onclick="next()">➡️</button></div>
                <img id="q-image" class="q-img" src=""><div id="q-txt" class="question-text"></div>
                <div id="options-container"></div><div id="expl-box" class="explanation"></div>
                <button id="next-btn" class="main-btn" style="display:none; background: var(--success)" onclick="next()">CÂU TIẾP THEO ⮕</button>
            </div>
            <div id="quiz-empty" style="text-align:center; padding-top:100px; color:#64748b;"><p>Chưa có dữ liệu bài học.</p></div>
        </div>
        <div id="config-section">
            <h3>Nạp dữ liệu từ AI</h3>
            <textarea id="json-input" placeholder="Dán mã JSON vào đây..."></textarea>
            <button class="main-btn" onclick="saveData()">💾 Lưu bài học mới</button>
        </div>
    </div>
</div>
<script>
    let vocabulary = [], currentIdx = 0;
    window.onload = () => {
        const saved = localStorage.getItem('my_vocab_data');
        if(saved) {
            vocabulary = JSON.parse(saved);
            document.getElementById('quiz-active').style.display = 'block';
            document.getElementById('quiz-empty').style.display = 'none';
            document.getElementById('total-idx').innerText = vocabulary.length;
            currentIdx = parseInt(localStorage.getItem('my_vocab_idx') || 0);
            renderQuiz();
        }
        updateStats();
    };
    function showTab(tab, el) {
        ['stats','quiz','config'].forEach(t => document.getElementById(t+'-section').style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tab+'-section').style.display = 'block';
        el.classList.add('active');
        updateStats();
    }
    function speak(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.85; window.speechSynthesis.speak(u); }
    function renderQuiz() {
        if(!vocabulary[currentIdx]) return;
        const item = vocabulary[currentIdx];
        document.getElementById('q-txt').innerText = item.question;
        document.getElementById('cur-idx').innerText = currentIdx + 1;
        document.getElementById('q-image').src = item.img;
        document.getElementById('expl-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        item.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
                if(i === item.correct) {
                    div.classList.add('correct');
                    localStorage.setItem('my_correct_count', parseInt(localStorage.getItem('my_correct_count')||0) + 1);
                } else {
                    div.classList.add('wrong');
                    document.querySelectorAll('.option')[item.correct].classList.add('correct');
                }
                const box = document.getElementById('expl-box');
                box.innerHTML = `<button class="voice-btn" onclick="speak('${item.word}')">🔊</button><b>${item.word}:</b> ${item.explanation}`;
                box.style.display = 'block';
                document.getElementById('next-btn').style.display = 'block';
                speak(item.word);
            };
            container.appendChild(div);
        });
        localStorage.setItem('my_vocab_idx', currentIdx);
    }
    function next() { if(currentIdx < vocabulary.length - 1) { currentIdx++; renderQuiz(); } else { alert("Đã hết bộ từ này!"); } }
    function prev() { if(currentIdx > 0) { currentIdx--; renderQuiz(); } }
    function saveData() {
        try {
            const input = document.getElementById('json-input').value;
            const parsed = JSON.parse(input);
            localStorage.setItem('my_vocab_data', input);
            localStorage.setItem('my_vocab_idx', 0);
            let master = JSON.parse(localStorage.getItem('my_master_list') || "[]");
            parsed.forEach(v => { if(!master.includes(v.word.toLowerCase())) master.push(v.word.toLowerCase()); });
            localStorage.setItem('my_master_list', JSON.stringify(master));
            if(!localStorage.getItem('my_start_date')) localStorage.setItem('my_start_date', new Date().toISOString());
            location.reload();
        } catch(e) { alert("Lỗi JSON!"); }
    }
    function updateStats() {
        document.getElementById('stat-total').innerText = JSON.parse(localStorage.getItem('my_master_list') || "[]").length;
        document.getElementById('stat-correct').innerText = localStorage.getItem('my_correct_count') || 0;
        const start = localStorage.getItem('my_start_date');
        if(start) { document.getElementById('stat-days').innerText = Math.floor((new Date() - new Date(start)) / 86400000) + 1; }
    }
</script>
</body>
</html>
